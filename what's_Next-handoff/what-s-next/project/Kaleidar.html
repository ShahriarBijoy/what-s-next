<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Kaleidar — Calendar prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #E8E6DF; font-family: 'Space Grotesk', system-ui, sans-serif; overflow: hidden; }
  #root { min-height: 100vh; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="views.jsx"></script>
<script type="text/babel" src="calendar-view.jsx"></script>
<script type="text/babel" src="detail-create.jsx"></script>

<script type="text/babel">
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#F3701E",
  "bg": "#EDE6D6",
  "serifItalicHeaders": true,
  "cardRotation": true
}/*EDITMODE-END*/;

function App() {
  const [view, setView] = React.useState(() => localStorage.getItem('kd_view') || 'today');
  const [openEvent, setOpenEvent] = React.useState(null);
  const [createOpen, setCreateOpen] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAKS_DEFAULTS);
  const [tweaksOn, setTweaksOn] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('kd_view', view); }, [view]);

  // Tweaks wiring
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  // Apply bg color
  React.useEffect(() => {
    document.body.style.background = tweaks.bg;
  }, [tweaks.bg]);

  return (
    <div style={{
      minHeight: '100vh', background: tweaks.bg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 40,
    }}>
      <div data-screen-label="Calendar app" style={{ position: 'relative' }}>
        <IOSDevice width={402} height={874}>
          <div style={{
            background: tweaks.bg, minHeight: '100%', position: 'relative',
            paddingTop: 58,
          }}>
            {/* Top chrome */}
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '8px 20px 18px',
            }}>
              <SegControl value={view} onChange={setView}
                options={[{ value: 'today', label: 'Today' }, { value: 'cal', label: 'Calendar' }]}/>
              <PlusButton onClick={() => setCreateOpen(true)} rotate={createOpen}/>
            </div>

            {/* View content with crossfade */}
            <div style={{ position: 'relative' }}>
              <div key={view} style={{
                animation: 'kdFade 0.5s cubic-bezier(.2,.9,.2,1)',
              }}>
                {view === 'today'
                  ? <TodayView onOpenEvent={() => {}} onCreateNew={() => setCreateOpen(true)}/>
                  : <CalendarView onOpenEvent={setOpenEvent}/>}
              </div>
            </div>
          </div>

          {/* Overlays */}
          {openEvent && <EventDetail ev={openEvent} onClose={() => setOpenEvent(null)}/>}
          <CreateSheet open={createOpen} onClose={() => setCreateOpen(false)}/>
        </IOSDevice>

        {/* Label under phone */}
        <div style={{
          marginTop: 18, textAlign: 'center',
          fontFamily: 'JetBrains Mono, monospace', fontSize: 11,
          color: PALETTE.ink, opacity: 0.45, letterSpacing: 2, textTransform: 'uppercase',
        }}>Kaleidar — {view === 'today' ? 'Today' : 'Week'} view</div>
      </div>

      {/* Tweaks panel */}
      {tweaksOn && (
        <div style={{
          position: 'fixed', right: 20, bottom: 20, zIndex: 200,
          background: '#fff', borderRadius: 20, padding: 16,
          width: 260, boxShadow: '0 20px 60px rgba(0,0,0,0.25)',
          fontFamily: 'Space Grotesk, system-ui',
        }}>
          <div style={{ fontFamily: 'Instrument Serif, serif', fontSize: 22, marginBottom: 12 }}>Tweaks</div>

          <div style={{ fontSize: 11, letterSpacing: 1, textTransform: 'uppercase', opacity: 0.5, marginTop: 8 }}>Background</div>
          <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
            {['#E8E6DF', '#EDE6D6', '#1A1A1A', '#B8E5C2', '#A9D8E8'].map(c => (
              <button key={c} onClick={() => setTweak('bg', c)} style={{
                width: 32, height: 32, borderRadius: 999, border: tweaks.bg === c ? '2px solid #F3701E' : '1px solid #ddd',
                background: c, cursor: 'pointer',
              }}/>
            ))}
          </div>

          <div style={{ fontSize: 11, letterSpacing: 1, textTransform: 'uppercase', opacity: 0.5, marginTop: 14 }}>Accent</div>
          <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
            {['#F3701E', '#4B607F', '#1A1A1A', '#C9BBE0'].map(c => (
              <button key={c} onClick={() => setTweak('accent', c)} style={{
                width: 32, height: 32, borderRadius: 999, border: tweaks.accent === c ? '2px solid #000' : '1px solid #ddd',
                background: c, cursor: 'pointer',
              }}/>
            ))}
          </div>

          <label style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 14, fontSize: 13, cursor: 'pointer' }}>
            <input type="checkbox" checked={tweaks.cardRotation}
              onChange={e => setTweak('cardRotation', e.target.checked)}/>
            Playful card rotation
          </label>
        </div>
      )}

      <style>{`
        @keyframes kdFade {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
